services:
  postgres:
    image: postgres:16
    container_name: xsltcraft_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: xsltcraft
      POSTGRES_USER: xsltcraft
      POSTGRES_PASSWORD: xsltcraft_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
